# ============================================================
# vFairs API Test Configuration
# ============================================================
# Replace ALL values below with your own QA environment details.
# NEVER commit real tokens or internal URLs to a public repo.
# Add this file to .gitignore if it contains real values.
# ============================================================

# Base URL of your vFairs test environment
# Example: https://your-event.vfairs.com/api/
api.base.url=https://demo-api.vfairs.com/api/

# Auth token for API requests (use a dedicated QA test user token)
api.auth.token=YOUR_QA_TEST_TOKEN_HERE

# Test data IDs (use IDs from your QA/staging environment only)
api.app.id=12345
api.booth.id=11371
api.webinar.id=164320
api.user.id=99999
api.event.id=381

# Test user credentials (QA environment only)
api.test.email=qa-test@example.com
api.test.password=TestPassword@123
